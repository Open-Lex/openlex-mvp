<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenLex Pipeline Inspector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'JetBrains Mono', monospace, system-ui; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-semantic { background: #1e3a5f; color: #60a5fa; }
    .badge-norm_lookup { background: #1a3a2a; color: #4ade80; }
    .badge-qu_injection { background: #2a1a3a; color: #c084fc; }
    .badge-keyword { background: #3a2a1a; color: #fb923c; }
    .badge-hybrid { background: #3a2a1a; color: #f97316; }
    .badge-per_source { background: #1a2a3a; color: #38bdf8; }
    .badge-rrf_injected { background: #3a1a2a; color: #f472b6; }
    .badge-eg_enrichment { background: #2a3a1a; color: #a3e635; }
    .badge-tenor_enforce { background: #2a1a2a; color: #e879f9; }
    .badge-tenor_enforce_fallback { background: #1a1a2a; color: #a78bfa; }
    .tenor-panel { border: 1px solid #7e22ce; background: #1a0a2a; border-radius: 8px; padding: 12px; margin-top: 16px; }
    .stage-bar { height: 8px; border-radius: 4px; background: #1e293b; overflow: hidden; }
    .stage-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #3b82f6, #6366f1); }
    .chunk-row { border-left: 3px solid transparent; }
    .chunk-row.tracked { border-left-color: #f59e0b; background: rgba(245,158,11,0.05); }
    .chunk-row.final { border-left-color: #22c55e; }
    .chunk-row.filtered { opacity: 0.5; }
    .filter-badge { background: #450a0a; color: #fca5a5; }
    .boost-badge { background: #052e16; color: #86efac; }
    .penalty-badge { background: #450a0a; color: #fca5a5; }
    input, textarea { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; padding: 8px 12px; }
    input:focus, textarea:focus { outline: none; border-color: #6366f1; }
    button { cursor: pointer; }
    .scrollable { max-height: 480px; overflow-y: auto; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1e293b; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .spinner { width: 20px; height: 20px; border: 2px solid #334155; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo } = React;

const SOURCE_COLORS = {
  semantic: 'badge-semantic',
  norm_lookup: 'badge-norm_lookup',
  qu_injection: 'badge-qu_injection',
  keyword: 'badge-keyword',
  hybrid: 'badge-hybrid',
  per_source: 'badge-per_source',
  rrf_injected: 'badge-rrf_injected',
  eg_enrichment: 'badge-eg_enrichment',
  tenor_enforce: 'badge-tenor_enforce',
  tenor_enforce_fallback: 'badge-tenor_enforce_fallback',
};

function SourceBadge({ src }) {
  const cls = SOURCE_COLORS[src] || 'bg-slate-700 text-slate-300';
  return <span className={`badge ${cls} mr-1`}>{src}</span>;
}

function StageRow({ stage, maxCount }) {
  const pct = maxCount > 0 ? Math.round((stage.count_out / maxCount) * 100) : 0;
  return (
    <div className="py-2 px-3 rounded-lg mb-1" style={{background: stage.active ? '#0f1f35' : '#181825'}}>
      <div className="flex items-center justify-between mb-1">
        <span className="text-sm font-semibold" style={{color: stage.active ? '#93c5fd' : '#475569'}}>
          {stage.label}
        </span>
        <span className="text-xs text-slate-400">
          {stage.count_out} Chunks
          {stage.count_in != null && stage.count_in !== stage.count_out
            ? ` (vorher: ${stage.count_in})`
            : ''}
        </span>
      </div>
      <div className="stage-bar mb-1">
        <div className="stage-bar-fill" style={{width: `${pct}%`, opacity: stage.active ? 1 : 0.3}} />
      </div>
      <div className="text-xs text-slate-500 truncate" title={stage.detail}>{stage.detail}</div>
    </div>
  );
}

function ChunkRow({ chunk, isTracked, showAll }) {
  const [expanded, setExpanded] = useState(false);
  const isFiltered = chunk.filter_reason != null;
  const isFinal = chunk.final_rank > 0;

  if (!showAll && isFiltered && !isTracked) return null;

  const rowClass = `chunk-row px-3 py-2 mb-1 rounded-lg ${isTracked ? 'tracked' : ''} ${isFinal ? 'final' : ''} ${isFiltered && !isTracked ? 'filtered' : ''}`;
  const bg = isTracked ? 'bg-amber-950/30' : isFinal ? 'bg-emerald-950/30' : 'bg-slate-900/60';

  return (
    <div className={`${rowClass} ${bg} cursor-pointer`} onClick={() => setExpanded(e => !e)}>
      <div className="flex items-start justify-between gap-2">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            {isTracked && <span className="badge" style={{background:'#78350f',color:'#fcd34d'}}>🎯 TRACKED</span>}
            {isFinal && <span className="badge" style={{background:'#14532d',color:'#86efac'}}>#{chunk.final_rank}</span>}
            {isFiltered && <span className={`badge filter-badge`}>✗ {chunk.filter_reason}</span>}
            {chunk._tenor_injected && <span className="badge badge-tenor_enforce">🎵 tenor</span>}
            <span className="text-xs text-slate-400 font-mono truncate">{chunk.id}</span>
          </div>
          <div className="flex items-center gap-2 mt-1 flex-wrap">
            {chunk.sources.map(s => <SourceBadge key={s} src={s} />)}
            {chunk.source_type && <span className="text-xs text-slate-500">{chunk.source_type}</span>}
            {chunk.gericht && <span className="text-xs text-slate-500">{chunk.gericht}</span>}
            {chunk.aktenzeichen && <span className="text-xs text-blue-400">{chunk.aktenzeichen}</span>}
          </div>
        </div>
        <div className="text-right shrink-0">
          {chunk.ce_score_raw != null && (
            <div className="text-xs" style={{color: chunk.ce_score_raw > 5 ? '#4ade80' : chunk.ce_score_raw > 3 ? '#facc15' : '#f87171'}}>
              CE: {chunk.ce_score_raw.toFixed(2)}
            </div>
          )}
          {chunk.rrf_rank > 0 && <div className="text-xs text-slate-500">rrf#{chunk.rrf_rank}</div>}
        </div>
      </div>

      {chunk.boosts_applied.length > 0 && (
        <div className="mt-1 flex flex-wrap gap-1">
          {chunk.boosts_applied.map((b, i) => (
            <span key={i} className={`badge ${b.includes('div') || b.includes('penalty') ? 'penalty-badge' : 'boost-badge'}`}>{b}</span>
          ))}
        </div>
      )}

      {expanded && chunk.doc_preview && (
        <div className="mt-2 text-xs text-slate-400 italic border-t border-slate-700 pt-2 font-sans">
          {chunk.doc_preview}…
        </div>
      )}
    </div>
  );
}

function RewritePanel({ rewrite }) {
  if (!rewrite || !rewrite.used) return null;
  return (
    <div className="rounded-lg p-3 mb-4" style={{background:'#1a1a2e',border:'1px solid #3730a3'}}>
      <div className="text-xs font-semibold text-indigo-400 mb-1">🔄 Query Rewriting aktiv ({Math.round(rewrite.duration_ms)}ms{rewrite.from_cache ? ', cached' : ''})</div>
      <div className="text-xs text-slate-400"><span className="text-slate-500">Original:</span> {rewrite.original}</div>
      <div className="text-xs text-slate-300"><span className="text-slate-500">Rewritten:</span> {rewrite.rewritten}</div>
    </div>
  );
}

function TenorEnforcePanel({ tenor }) {
  if (!tenor) return null;
  const injected = tenor.injected || [];
  const misses   = tenor.misses   || [];
  const already  = tenor.already_present || [];
  if (injected.length === 0 && misses.length === 0 && already.length === 0) return null;
  return (
    <div className="tenor-panel mb-4">
      <div className="text-xs font-semibold mb-2" style={{color:'#e879f9'}}>
        🎵 Tenor-Enforce
        {injected.length > 0 && <span className="ml-2 badge badge-tenor_enforce">+{injected.length} injiziert</span>}
        {already.length > 0  && <span className="ml-2 badge" style={{background:'#14532d',color:'#86efac'}}>{already.length} bereits vorhanden</span>}
        {misses.length > 0   && <span className="ml-2 badge" style={{background:'#450a0a',color:'#fca5a5'}}>⚠ {misses.length} fehlen</span>}
      </div>
      {injected.length > 0 && (
        <div className="text-xs text-slate-400 mb-1">
          <span className="text-slate-500">Injiziert: </span>
          {injected.map((item, i) => (
            <span key={i} className="mr-2">
              <span className="text-purple-300">{item.az}</span>
              <span className="text-slate-500"> [{item.segment}]</span>
            </span>
          ))}
        </div>
      )}
      {misses.length > 0 && (
        <div className="text-xs" style={{color:'#fca5a5'}}>
          <span className="text-slate-500">Kein Tenor gefunden für: </span>
          {misses.join(', ')}
        </div>
      )}
    </div>
  );
}

function App() {
  const [query, setQuery] = useState('');
  const [chunkSearch, setChunkSearch] = useState('');
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [showAll, setShowAll] = useState(false);
  const [filterSource, setFilterSource] = useState('');
  const [activeTab, setActiveTab] = useState('pipeline'); // 'pipeline' | 'chunks' | 'final'

  const run = useCallback(async () => {
    if (!query.trim()) return;
    setLoading(true);
    setError(null);
    setResult(null);
    try {
      const resp = await fetch('api/inspect', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({query: query.trim(), chunk_search: chunkSearch.trim() || null}),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({detail: resp.statusText}));
        throw new Error(err.detail || resp.statusText);
      }
      const data = await resp.json();
      setResult(data);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [query, chunkSearch]);

  const handleKey = (e) => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) run(); };

  const maxStageCount = result ? Math.max(...result.pipeline_stages.map(s => s.count_out || 0)) : 0;

  const filteredChunks = useMemo(() => {
    if (!result) return [];
    let chunks = result.chunks;
    if (filterSource) chunks = chunks.filter(c => c.sources.includes(filterSource));
    return chunks;
  }, [result, filterSource]);

  const trackedSet = useMemo(() => new Set(result?.tracked_chunks || []), [result]);

  const allSources = useMemo(() => {
    if (!result) return [];
    const s = new Set();
    result.chunks.forEach(c => c.sources.forEach(src => s.add(src)));
    return Array.from(s);
  }, [result]);

  return (
    <div className="min-h-screen p-4 max-w-7xl mx-auto">
      {/* Header */}
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-indigo-300">🔍 OpenLex Pipeline Inspector</h1>
        <p className="text-sm text-slate-500 mt-1">Retrieval-Pipeline Step-by-Step · return_trace=True · Port 7862</p>
      </div>

      {/* Input */}
      <div className="grid grid-cols-1 gap-3 mb-4 lg:grid-cols-3">
        <div className="lg:col-span-2">
          <label className="block text-xs text-slate-400 mb-1">Anfrage</label>
          <textarea
            value={query}
            onChange={e => setQuery(e.target.value)}
            onKeyDown={handleKey}
            rows={2}
            className="w-full text-sm"
            placeholder="z.B. Muss mein Mobilfunkanbieter meine SCHUFA-Positivdaten melden? (Ctrl+Enter zum Starten)"
          />
        </div>
        <div>
          <label className="block text-xs text-slate-400 mb-1">Chunk suchen (optional)</label>
          <input
            value={chunkSearch}
            onChange={e => setChunkSearch(e.target.value)}
            className="w-full text-sm"
            placeholder="z.B. C-34/10 oder Röttler"
          />
          <button
            onClick={run}
            disabled={loading || !query.trim()}
            className="mt-2 w-full py-2 px-4 rounded-lg font-semibold text-sm transition-all"
            style={{background: loading || !query.trim() ? '#1e293b' : '#4f46e5', color: loading || !query.trim() ? '#475569' : '#fff'}}
          >
            {loading ? <><span className="spinner mr-2" style={{verticalAlign:'middle'}} />Analysiere…</> : '▶ Pipeline starten'}
          </button>
        </div>
      </div>

      {error && (
        <div className="rounded-lg p-3 mb-4 text-sm" style={{background:'#450a0a',border:'1px solid #b91c1c',color:'#fca5a5'}}>
          ❌ {error}
        </div>
      )}

      {result && (
        <div>
          {/* Summary Bar */}
          <div className="flex items-center gap-4 mb-4 text-sm text-slate-400 flex-wrap">
            <span>⏱ {result.duration_ms}ms</span>
            <span>📦 {result.chunks.length} Chunks im Trace</span>
            <span>✅ {result.final_results.length} finale Chunks</span>
            {result.tracked_chunks.length > 0 && (
              <span style={{color:'#fcd34d'}}>🎯 {result.tracked_chunks.length} Chunks gefunden: <b>{chunkSearch}</b></span>
            )}
            {result.tracked_chunks.length === 0 && chunkSearch && (
              <span style={{color:'#f87171'}}>⚠ "{chunkSearch}" nicht im Trace gefunden</span>
            )}
          </div>

          <RewritePanel rewrite={result.rewrite} />
          <TenorEnforcePanel tenor={result.tenor_enforce} />

          {/* Tabs */}
          <div className="flex gap-2 mb-4">
            {['pipeline', 'chunks', 'final'].map(tab => (
              <button
                key={tab}
                onClick={() => setActiveTab(tab)}
                className="px-4 py-1.5 rounded-full text-sm font-medium transition-all"
                style={{
                  background: activeTab === tab ? '#4f46e5' : '#1e293b',
                  color: activeTab === tab ? '#fff' : '#94a3b8',
                }}
              >
                {tab === 'pipeline' ? '📊 Pipeline' : tab === 'chunks' ? '📋 Alle Chunks' : '✅ Finale Auswahl'}
              </button>
            ))}
          </div>

          {/* Pipeline Tab */}
          {activeTab === 'pipeline' && (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <div>
                <h2 className="text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wider">Pipeline-Stages</h2>
                {result.pipeline_stages.map(s => (
                  <StageRow key={s.id} stage={s} maxCount={maxStageCount} />
                ))}
              </div>
              <div>
                <h2 className="text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wider">Source-Type-Mix (finale Chunks)</h2>
                {(() => {
                  const counts = {};
                  result.final_results.forEach(c => {
                    const st = c.source_type || 'unbekannt';
                    counts[st] = (counts[st] || 0) + 1;
                  });
                  const total = result.final_results.length;
                  return Object.entries(counts).sort((a,b) => b[1]-a[1]).map(([st, n]) => (
                    <div key={st} className="mb-2">
                      <div className="flex justify-between text-xs mb-0.5">
                        <span className="text-slate-300">{st}</span>
                        <span className="text-slate-400">{n} ({Math.round(n/total*100)}%)</span>
                      </div>
                      <div className="stage-bar">
                        <div className="stage-bar-fill" style={{width:`${n/total*100}%`}} />
                      </div>
                    </div>
                  ));
                })()}

                {result.tracked_chunks.length > 0 && (
                  <div className="mt-4">
                    <h2 className="text-sm font-semibold text-amber-400 mb-2 uppercase tracking-wider">🎯 Tracked: {chunkSearch}</h2>
                    {result.chunks
                      .filter(c => trackedSet.has(c.id))
                      .map(c => <ChunkRow key={c.id} chunk={c} isTracked showAll />)
                    }
                  </div>
                )}
              </div>
            </div>
          )}

          {/* All Chunks Tab */}
          {activeTab === 'chunks' && (
            <div>
              <div className="flex items-center gap-3 mb-3 flex-wrap">
                <label className="flex items-center gap-2 text-sm text-slate-400 cursor-pointer">
                  <input type="checkbox" checked={showAll} onChange={e => setShowAll(e.target.checked)} />
                  Gefilterte Chunks anzeigen
                </label>
                <select
                  value={filterSource}
                  onChange={e => setFilterSource(e.target.value)}
                  className="text-sm py-1"
                >
                  <option value="">Alle Sources</option>
                  {allSources.map(s => <option key={s} value={s}>{s}</option>)}
                </select>
                <span className="text-xs text-slate-500">{filteredChunks.length} Chunks</span>
              </div>
              <div className="scrollable">
                {filteredChunks
                  .sort((a,b) => {
                    if (trackedSet.has(a.id) && !trackedSet.has(b.id)) return -1;
                    if (!trackedSet.has(a.id) && trackedSet.has(b.id)) return 1;
                    if (a.final_rank > 0 && b.final_rank <= 0) return -1;
                    if (a.final_rank <= 0 && b.final_rank > 0) return 1;
                    if (a.final_rank > 0 && b.final_rank > 0) return a.final_rank - b.final_rank;
                    return (b.ce_score_raw || 0) - (a.ce_score_raw || 0);
                  })
                  .map(c => (
                    <ChunkRow
                      key={c.id}
                      chunk={c}
                      isTracked={trackedSet.has(c.id)}
                      showAll={showAll}
                    />
                  ))
                }
              </div>
            </div>
          )}

          {/* Final Results Tab */}
          {activeTab === 'final' && (
            <div>
              <div className="scrollable">
                {result.final_results.map(c => (
                  <ChunkRow key={c.id} chunk={c} isTracked={trackedSet.has(c.id)} showAll />
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Hints */}
      {!result && !loading && (
        <div className="mt-8 text-center text-slate-600 text-sm">
          <p>Gib eine Anfrage ein und starte die Pipeline.</p>
          <p className="mt-1">Nutze <b>Chunk suchen</b> um z.B. das Rottler-Urteil (<code>C-526/24</code>) zu tracken.</p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
